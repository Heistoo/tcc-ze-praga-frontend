    <path d="M-60,60 C-60,-40 60,-60 80,-80 C80,-60 60,40 -60,60 Z" fill="url(#leaf)" opacity="0.3"/>
    <path d="M-60,60 C-60,-40 60,-60 80,-80 C80,-60 60,40 -60,60 Z"/>
    <path d="M-20,20 C0,0 30,-20 50,-40"/>
  </g>
  <!-- ZP text -->
